name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          TAG="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          VERSION="${TAG#v}"
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          if [ "$VERSION" != "$FILE_VERSION" ]; then
            echo "::error::Tag $TAG does not match VERSION file ($FILE_VERSION)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-linux:
    needs: validate
    strategy:
      matrix:
        include:
          - target: x86_64-linux
            runner: ubuntu-latest
          - target: aarch64-linux
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Stage generated Nix files
        run: cp ghostty/build.zig.zon.nix build.zig.zon.nix && git add -f build.zig.zon.nix

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: accept-flake-config = true

      - uses: cachix/cachix-action@v16
        with:
          name: trolley
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Cache Zig deps
        id: deps
        run: nix build -L -v .#deps && echo "deps=$(readlink ./result)" >> "$GITHUB_OUTPUT"

      - name: Build and package
        run: nix develop -L -v -c just release --target ${{ matrix.target }} --system ${{ steps.deps.outputs.deps }}

      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.target }}
          path: dist/trolley-*.tar.xz

  build-macos:
    needs: validate
    strategy:
      matrix:
        include:
          - target: x86_64-macos
            runner: macos-15-large
          - target: aarch64-macos
            runner: macos-15
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Stage generated Nix files
        run: cp ghostty/build.zig.zon.nix build.zig.zon.nix && git add -f build.zig.zon.nix

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: accept-flake-config = true

      - uses: cachix/cachix-action@v16
        with:
          name: trolley
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Cache Zig deps
        id: deps
        run: nix build -L -v .#deps && echo "deps=$(readlink ./result)" >> "$GITHUB_OUTPUT"

      - name: Build and package
        run: nix develop -L -v -c just release --target ${{ matrix.target }} --system ${{ steps.deps.outputs.deps }}

      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.target }}
          path: dist/trolley-*.tar.xz

  release:
    needs: [validate, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "trolley ${VERSION}" \
            --generate-notes \
            trolley-*.tar.xz
