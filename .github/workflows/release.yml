name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          TAG="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          VERSION="${TAG#v}"
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          if [ "$VERSION" != "$FILE_VERSION" ]; then
            echo "::error::Tag $TAG does not match VERSION file ($FILE_VERSION)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-linux:
    needs: validate
    strategy:
      matrix:
        include:
          - target: x86_64-linux
            runner: ubuntu-latest
          - target: aarch64-linux
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Stage generated Nix files
        run: cp ghostty/build.zig.zon.nix build.zig.zon.nix && git add -f build.zig.zon.nix

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: accept-flake-config = true

      - uses: cachix/cachix-action@v16
        with:
          name: trolley
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Cache Zig deps
        id: deps
        run: nix build -L -v .#deps && echo "deps=$(readlink ./result)" >> "$GITHUB_OUTPUT"

      - name: Build and package
        run: nix develop -L -v -c just release --target ${{ matrix.target }} --system ${{ steps.deps.outputs.deps }}

      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.target }}
          path: dist/trolley-*.tar.xz

  build-macos:
    needs: validate
    strategy:
      matrix:
        include:
          - target: x86_64-macos
            runner: macos-15-large
          - target: aarch64-macos
            runner: macos-15
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Stage generated Nix files
        run: cp ghostty/build.zig.zon.nix build.zig.zon.nix && git add -f build.zig.zon.nix

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: accept-flake-config = true

      - uses: cachix/cachix-action@v16
        with:
          name: trolley
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Cache Zig deps
        id: deps
        run: nix build -L -v .#deps && echo "deps=$(readlink ./result)" >> "$GITHUB_OUTPUT"

      - name: Build and package
        run: nix develop -L -v -c just release --target ${{ matrix.target }} --system ${{ steps.deps.outputs.deps }}

      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.target }}
          path: dist/trolley-*.tar.xz

  build-windows:
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zig
        shell: pwsh
        run: |
          $fileContent = Get-Content -Path "runtime/build.zig.zon" -Raw
          $pattern = 'minimum_zig_version\s*=\s*"([^"]+)"'
          $zigVersion = [regex]::Match($fileContent, $pattern).Groups[1].Value
          $version = "zig-x86_64-windows-$zigVersion"
          Write-Output "Installing $version"
          $uri = "https://ziglang.org/download/$zigVersion/$version.zip"
          Invoke-WebRequest -Uri "$uri" -OutFile ".\zig-windows.zip"
          Expand-Archive -Path ".\zig-windows.zip" -DestinationPath ".\" -Force
          Remove-Item -Path ".\zig-windows.zip"
          Rename-Item -Path ".\$version" -NewName ".\zig"
          Write-Host "Zig installed:"
          .\zig\zig.exe version
          # Add zig to PATH for subsequent steps
          "$PWD\zig" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Setup environment
        shell: bash
        run: |
          rustup target add x86_64-pc-windows-gnu
          # MSYS2 provides cygpath (needed by just) and xz (needed by tar -J)
          echo "C:\msys64\usr\bin" >> "$GITHUB_PATH"
          cargo install just

      - name: Build and package
        shell: bash
        run: just release --target x86_64-windows

      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-x86_64-windows
          path: dist/trolley-*.tar.xz

  release:
    needs: [validate, build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "trolley ${VERSION}" \
            --generate-notes \
            trolley-*.tar.xz
