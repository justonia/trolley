[app]
identifier = "com.example.opentui"
display_name = "OpenTUI Example"
slug = "opentui"
version = "0.1.0"

[linux]
binaries = { x86_64 = "bin/opentui" }

[macos]
binaries = { aarch64 = "bin/opentui", x86_64 = "bin/opentui" }

[gui]
initial_width = 700
initial_height = 500
min_width = 400
min_height = 300

[ghostty]
font-size = 13
title = "Trolley - OpenTUI Key Viewer"
keybind = [
    "ctrl+==increase_font_size:1",
    "ctrl+plus=increase_font_size:1",
    "ctrl+-=decrease_font_size:1",
    "ctrl+0=reset_font_size",
    "super+==increase_font_size:1",
    "super+plus=increase_font_size:1",
    "super+-=decrease_font_size:1",
    "super+0=reset_font_size",
]
